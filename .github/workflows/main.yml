name: Build & Deploy OnlineVotingSystem

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  BACKEND_IMAGE: ghcr.io/shahedul425/online-voting-system-backend
  FRONTEND_IMAGE: ghcr.io/shahedul425/online-voting-system-frontend

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Build and run unit tests with coverage
        run: mvn -B clean verify -DskipITs --file OnlineVotingSystem/Backend/demo/pom.xml
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: OnlineVotingSystem/Backend/demo/target/site/jacoco/jacoco.xml
        continue-on-error: true

      - name: Zip JaCoCo report
        if: always()
        run: |
          if [ -d "OnlineVotingSystem/Backend/demo/target/site/jacoco" ]; then
            cd OnlineVotingSystem/Backend/demo/target/site
            zip -r jacoco-report.zip jacoco
          fi

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: OnlineVotingSystem/Backend/demo/target/site/jacoco-report.zip
          if-no-files-found: ignore

      - name: Set image tag
        if: github.event_name != 'pull_request'
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./OnlineVotingSystem/Backend/demo
          file: ./OnlineVotingSystem/Backend/demo/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}

      - name: Build and push frontend image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./OnlineVotingSystem/Frontend/my-react-app
          file: ./OnlineVotingSystem/Frontend/my-react-app/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.trustvote.live
            VITE_KEYCLOAK_URL=https://auth.trustvote.live/auth
            VITE_KEYCLOAK_REALM=OVS-System
            VITE_KEYCLOAK_CLIENT_ID=ovs_frontend
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}

      - name: Deploy over SSH
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export BACKEND_IMAGE="${{ env.BACKEND_IMAGE }}"
            export FRONTEND_IMAGE="${{ env.FRONTEND_IMAGE }}"
            export IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
            cd /opt/trustvote/online-voting-system
            /usr/bin/env bash ./deploy.sh

      - name: Health check API
        if: github.event_name == 'push'
        run: |
          sleep 15
          curl -fsS https://api.trustvote.live/actuator/health