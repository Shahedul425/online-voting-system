name: Build and Deploy OnlineVotingSystem
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: shahedul425
  BACKEND_IMAGE: ghcr.io/shahedul425/online-voting-system-backend
  FRONTEND_IMAGE: ghcr.io/shahedul425/online-voting-system-frontend

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Run backend tests
        run: mvn -B clean verify -DskipITs --file OnlineVotingSystem/Backend/demo/pom.xml

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.event_name != 'pull_request'

    outputs:
      backend_tag: ${{ steps.meta.outputs.backend_tag }}
      frontend_tag: ${{ steps.meta.outputs.frontend_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "backend_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./OnlineVotingSystem/Backend/demo
          file: ./OnlineVotingSystem/Backend/demo/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.backend_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./OnlineVotingSystem/Frontend/my-react-app
          file: ./OnlineVotingSystem/Frontend/my-react-app/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.trustvote.live
            VITE_KEYCLOAK_URL=https://auth.trustvote.live
            VITE_KEYCLOAK_REALM=OVS-System
            VITE_KEYCLOAK_CLIENT_ID=ovs_frontend
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.frontend_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    environment:
      name: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export BACKEND_IMAGE="${{ env.BACKEND_IMAGE }}"
            export FRONTEND_IMAGE="${{ env.FRONTEND_IMAGE }}"
            export IMAGE_TAG="${{ needs.build-and-push.outputs.backend_tag }}"
            cd /opt/trustvote/online-voting-system
            /usr/bin/env bash ./deploy.sh

      - name: Health check API
        run: |
          sleep 10
          curl -fsS https://api.trustvote.live/actuator/health