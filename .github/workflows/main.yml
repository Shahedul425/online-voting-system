name: Build and Deploy

on:
  push:
    branches: ["main"]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Build backend
        run: |
          mvn clean package -DskipTests \
          --file OnlineVotingSystem/Backend/demo/pom.xml

      - name: Build backend Docker image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/online-voting-system-backend:latest \
          ./OnlineVotingSystem/Backend/demo

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
          | docker login ghcr.io \
          -u ${{ github.actor }} \
          --password-stdin

      - name: Push backend image
        run: |
          docker push \
          ghcr.io/${{ github.repository_owner }}/online-voting-system-backend:latest

  deploy:

    needs: build
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /opt/trustvote/online-voting-system
            ./deploy.sh