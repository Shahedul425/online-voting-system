name: Build & Deploy OnlineVotingSystem

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Unit Tests
        run: mvn -B test --file OnlineVotingSystem/Backend/demo/pom.xml

      - name: Build the application
        run: mvn -B clean package --file OnlineVotingSystem/Backend/demo/pom.xml

      - name: Build and test application
        run: mvn -B clean verify --file OnlineVotingSystem/Backend/demo/pom.xml

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: OnlineVotingSystem/Backend/demo/target/site/jacoco