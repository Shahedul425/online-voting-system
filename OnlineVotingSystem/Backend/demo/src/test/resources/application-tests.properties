# Test profile overrides
# IntegrationTestBase activates this with @ActiveProfiles("tests")

# --- Mail ---
# Empty host => OtpMailService logs a WARN and skips the send. No real SMTP
# round-trips happen during ITs, so we don't time out trying to dial Gmail.
spring.mail.host=
spring.mail.username=
spring.mail.password=
ovs.mail.from=test@trustvote.local
ovs.mail.from-name=TrustVoteTest

# --- Dev OTP echo ---
# Tests that need to read the issued tokenId pull it from the response body.
ovs.dev.return-otp=true

# --- Misc ---
ovs.public.base-url=http://localhost:5173
spring.docker.compose.enabled=false
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always
