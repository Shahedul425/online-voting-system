spring.application.name=demo

# Keycloak (local access via browser)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/OVS-System
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/OVS-System/protocol/openid-connect/certs

keycloak.base-url=http://localhost:8081
keycloak.realm=OVS-System
keycloak.client-id=ovs_frontend

# Database (app_db container mapped to host port 5433)
spring.datasource.url=jdbc:postgresql://localhost:5433/ovsApp
spring.datasource.username=ovsApp
spring.datasource.password=change-this-app-db-password

spring.jpa.database=postgresql
spring.jpa.hibernate.ddl-auto=update

logging.level.org.springframework.security=DEBUG
logging.level.com.example.demo=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n

spring.docker.compose.enabled=false
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

receipt.token.secret=shahed12345@

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

ovs.dev.return-otp=true
ovs.public.base-url=http://localhost:5173

# --- SMTP (outbound OTP email) -----------------------------------------------
# Read by OtpMailService. Leave SMTP_USERNAME / SMTP_PASSWORD as env vars so
# you don't commit your Gmail App Password. When they're blank the service
# logs a WARN and skips the send — the dev devOtp echo path keeps working.
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

ovs.mail.from=${OVS_MAIL_FROM:islamshahedul537@gmail.com}
ovs.mail.from-name=${OVS_MAIL_FROM_NAME:TrustVote}