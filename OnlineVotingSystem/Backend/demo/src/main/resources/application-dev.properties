spring.application.name=demo

# Keycloak — defaults are local, but env vars override so this profile is
# survivable in any environment. NOTE: we intentionally let Spring auto-derive
# jwk-set-uri from issuer-uri; only set jwk-set-uri explicitly if you have a
# split-hostname setup (browser sees one URL, app sees another).
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081/realms/OVS-System}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8081/realms/OVS-System/protocol/openid-connect/certs}

keycloak.base-url=${KEYCLOAK_BASE_URL:http://localhost:8081}
keycloak.realm=${KEYCLOAK_REALM:OVS-System}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:ovs_frontend}

# Database — local default, env overrides for any other env.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ovsApp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ovsApp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change-this-app-db-password}

spring.jpa.database=postgresql
spring.jpa.hibernate.ddl-auto=update

logging.level.org.springframework.security=DEBUG
logging.level.com.example.demo=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n

spring.docker.compose.enabled=false
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

receipt.token.secret=shahed12345@

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

ovs.dev.return-otp=true
ovs.public.base-url=http://localhost:5173

# --- SMTP (outbound OTP email) -----------------------------------------------
# Read by OtpMailService. Leave SMTP_USERNAME / SMTP_PASSWORD as env vars so
# you don't commit your Gmail App Password. When they're blank the service
# logs a WARN and skips the send — the dev devOtp echo path keeps working.
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

ovs.mail.from=${OVS_MAIL_FROM:islamshahedul537@gmail.com}
ovs.mail.from-name=${OVS_MAIL_FROM_NAME:TrustVote}