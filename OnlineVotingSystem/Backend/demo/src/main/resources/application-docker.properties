spring.application.name=demo

# Keycloak from inside docker network
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/OVS-System
keycloak.base-url=http://keycloak:8080
keycloak.realm=OVS-System
keycloak.client-id=ovs_frontend

# DB inside docker network
spring.datasource.url=jdbc:postgresql://app_db:5432/ovsApp
spring.datasource.username=ovsApp
spring.datasource.password=ovsPass

spring.jpa.database=postgresql
spring.jpa.hibernate.ddl-auto=update

logging.level.org.springframework.security=DEBUG
logging.level.com.example.demo=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n

spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

receipt.token.secret=shahed12345@

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
