spring.profiles.active=dev

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081/realms/OVS-System}
keycloak.base-url=${KEYCLOAK_BASE_URL:http://localhost:8081}
keycloak.realm=${KEYCLOAK_REALM:OVS-System}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:ovs_frontend}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ovsApp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ovsApp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change-this-app-db-password}

spring.jpa.database=${SPRING_JPA_DATABASE:postgresql}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}

logging.level.com.example.demo=${LOGGING_LEVEL_COM_EXAMPLE_DEMO:DEBUG}
logging.level.org.springframework=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK:INFO}
logging.level.org.hibernate=${LOGGING_LEVEL_ORG_HIBERNATE:WARN}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:DEBUG}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:80}