#spring.profiles.active=dev

spring.docker.compose.enabled=false
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081/realms/OVS-System}
keycloak.base-url=${KEYCLOAK_BASE_URL:http://localhost:8081}
keycloak.realm=${KEYCLOAK_REALM:OVS-System}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:ovs_frontend}
receipt.token.secret=${RECEIPT_TOKEN_SECRET:local-dev-secret-change-me}


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ovsApp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ovsApp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change-this-app-db-password}

spring.jpa.database=${SPRING_JPA_DATABASE:postgresql}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}

logging.level.com.example.demo=${LOGGING_LEVEL_COM_EXAMPLE_DEMO:DEBUG}
logging.level.org.springframework=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK:INFO}
logging.level.org.hibernate=${LOGGING_LEVEL_ORG_HIBERNATE:WARN}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:DEBUG}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:80}

# Public base URL used when building share-links (e.g. /verify-receipt?election=...)
ovs.public.base-url=${OVS_PUBLIC_BASE_URL:http://localhost:5173}

# Return the tokenId in the /voter/verification/verify response body (dev demos only).
# Default is TRUE so local "run from IDE" demos work without extra config.
# MUST be set to false in prod via OVS_DEV_RETURN_OTP=false — tokens should
# be delivered out-of-band (email/SMS) in real deployments.
ovs.dev.return-otp=${OVS_DEV_RETURN_OTP:true}

# -----------------------------------------------------------------------------
# SMTP (outbound mail) — used by OtpMailService to deliver ballot OTPs.
#
# Defaults below assume Gmail. To turn on real delivery:
#   1. In Google Account → Security → 2-step verification → App passwords,
#      generate a 16-character app password (e.g. "abcd efgh ijkl mnop").
#   2. Set the env vars before starting the backend (PowerShell):
#         $env:SMTP_USERNAME="islamshahedul537@gmail.com"
#         $env:SMTP_PASSWORD="<the 16-char app password, no spaces>"
#         $env:OVS_MAIL_FROM="islamshahedul537@gmail.com"
#   3. (Optional) flip OVS_DEV_RETURN_OTP=false once mail is confirmed working,
#      so the OTP stops being echoed in the API response body.
#
# When SMTP_USERNAME/PASSWORD are blank, OtpMailService logs a WARN and skips
# the send — verification still succeeds so the dev devOtp echo path keeps
# working for local demos.
# -----------------------------------------------------------------------------
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECT_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SMTP_READ_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITE_TIMEOUT:5000}

ovs.mail.from=${OVS_MAIL_FROM:islamshahedul537@gmail.com}
ovs.mail.from-name=${OVS_MAIL_FROM_NAME:TrustVote}
ovs.mail.support=${OVS_MAIL_SUPPORT:islamshahedul537@gmail.com}