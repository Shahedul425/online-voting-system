services:
  # Keycloak DB (PERSISTENT)  ✅ this is what you were missing
  postgres:
    image: postgres:15
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - ovs-network

  # App DB (PERSISTENT)
  app_db:
    image: postgres:15
    container_name: app-db
    environment:
      POSTGRES_DB: ovsApp
      POSTGRES_USER: ovsApp
      POSTGRES_PASSWORD: ovsPass
    ports:
      - "5433:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    networks:
      - ovs-network

  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak-server
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      # Keep it simple for dev: access via published port on localhost:8081
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - ovs-network

  # Prometheus (scrape IntelliJ-run app on your laptop)
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ovs-network

  loki:
    image: grafana/loki:3.1.1
    container_name: loki
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - ovs-network

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: [ "-config.file=/etc/tempo/tempo.yml" ]
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4318:4318"
    networks:
      - ovs-network

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - ./monitoring/alloy:/etc/alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: [ "run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.alloy" ]
    ports:
      - "12345:12345"
    depends_on:
      - loki
    networks:
      - ovs-network

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - ovs-network

  # Optional app container for later (prod/full run)
  app:
    profiles: ["full"]
    container_name: ovs-app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_SERVICE_NAME: ovs-app
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    ports:
      - "8080:8080"
    depends_on:
      - app_db
      - keycloak
      - tempo
    networks:
      - ovs-network

volumes:
  keycloak_db_data:
  app_db_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  ovs-network:
